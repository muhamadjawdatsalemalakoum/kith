name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The `kith` desktop app needs Tauri/webview system libs, so it's built and
      # linted in its own `desktop` job (below) with those deps installed.
      - name: Workspace tests
        run: cargo test --workspace --exclude kith
      - name: Relay-path test (real transport)
        run: cargo test -p mesh-engine --features test-utils --test relay

  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets --exclude kith -- -D warnings

  # Build + lint the actual shipped product (the Kith desktop app) on every OS, with
  # the Tauri/webview system deps installed — so a GUI regression is caught in CI and
  # a release tag never surprises us.
  desktop:
    name: desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Clippy (desktop app)
        run: cargo clippy -p kith --all-targets -- -D warnings
      - name: Test (desktop app)
        run: cargo test -p kith
      - name: Build (desktop app)
        run: cargo build -p kith
