name: Release

# Builds the Kith desktop app (the product) for Windows, macOS, and Linux and drafts
# a GitHub Release with installers attached. The `kith` binary it ships is both the
# GUI and the `kith serve` MCP server, so this one app covers everything.
#
# Triggered by pushing a version tag (e.g. `v0.1.0`) or run manually. The release is
# left as a DRAFT so you review and publish it.
#
# COST: free on a public repo. On a private repo it bills Actions minutes (Linux x1 /
# Windows x2 / macOS x10), so this runs on TAGS only.
#
# SIGNING: unsigned by default (users get a Gatekeeper/SmartScreen warning). To ship
# trusted builds, add the secrets noted in the `env:` block — no secrets are required
# for the build itself to succeed.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  desktop:
    name: build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon runner; builds a universal (arm64 + Intel) app
            args: "--target universal-apple-darwin"
          - platform: ubuntu-latest
            args: ""
          - platform: windows-latest
            args: "--bundles nsis" # branded NSIS installer (skip the dated WiX .msi)
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Keep the bundle version in lockstep with the tag (avoids a stale 0.0.1 installer).
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          V="${GITHUB_REF_NAME#v}"
          node -e "const fs=require('fs');const f='apps/desktop/tauri.conf.json';const j=JSON.parse(fs.readFileSync(f,'utf8'));j.version='$V';fs.writeFileSync(f,JSON.stringify(j,null,2)+'\n')"
          node -e "const fs=require('fs');let c=fs.readFileSync('Cargo.toml','utf8');c=c.replace(/^version = \"[^\"]*\"/m,'version = \"$V\"');fs.writeFileSync('Cargo.toml',c)"

      - name: Build + bundle + draft release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ---- Code signing (uncomment + add repo secrets to enable; unsigned otherwise) ----
          # macOS notarization (Apple Developer ID, $99/yr):
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Windows code signing:
          # WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          # WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
          # Auto-updater signing (set these to publish signed update artifacts):
          # TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Kith ${{ github.ref_name }}"
          releaseBody: |
            **Kith ${{ github.ref_name }}** — your circle of devices, in sync.

            Serverless, end-to-end-encrypted memory, tabs, and file sharing across your own
            devices — no account, no server. Your AI can use it too, over MCP.

            ### Downloads
            - **Windows** — `_x64-setup.exe`
            - **macOS** — `_universal.dmg` (Apple Silicon + Intel)
            - **Linux** — `.AppImage`, `.deb`, or `.rpm`

            > Builds are currently **unsigned**, so the OS may warn about an unverified developer —
            > on Windows choose "More info → Run anyway"; on macOS use System Settings → Privacy &
            > Security → "Open Anyway".
          releaseDraft: true
          prerelease: true
          args: ${{ matrix.args }}
