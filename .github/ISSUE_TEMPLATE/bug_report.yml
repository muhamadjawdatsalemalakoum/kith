name: Bug report
description: Report a reproducible problem in Kith.
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a problem. Please include enough detail for someone else to reproduce it.
  - type: input
    id: version
    attributes:
      label: Version
      description: Commit, tag, or release version where you saw the problem.
      placeholder: "v0.0.1, main@<sha>, or local checkout"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - agent-memory
        - centraltabs
        - mesh-engine
        - mesh-mcp
        - CI or packaging
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List the smallest set of steps that reproduces the problem.
      placeholder: |
        1. Run ...
        2. Pair ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or output
      description: Paste relevant output. Remove secrets, keys, tokens, and private data.
      render: text
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Windows 11, macOS 15, Ubuntu 24.04, etc."
    validations:
      required: true
  - type: input
    id: rust
    attributes:
      label: Rust version
      placeholder: "rustc --version"
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add any other context that may help with diagnosis.
